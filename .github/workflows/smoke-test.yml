name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke Test (OJS)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./docker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for dev
        run: |
          cat > .env << 'EOF'
          DB_NAME=ojs
          DB_USER=ojs
          DB_PASSWORD=ojspassword
          DB_ROOT_PASSWORD=rootpassword
          NGINX_HTTP_PORT=8080
          NGINX_HTTPS_PORT=8443
          EOF

      - name: Start services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

      - name: Wait for OJS to be ready
        run: |
          echo "Waiting for OJS to become healthy..."
          TIMEOUT=300
          ELAPSED=0
          INTERVAL=5
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Check if nginx is responding
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ 2>/dev/null | grep -qE "^(200|302|301)$"; then
              echo "OJS is ready! (elapsed: ${ELAPSED}s)"
              break
            fi
            echo "  Not ready yet... (${ELAPSED}s / ${TIMEOUT}s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: OJS did not become ready within ${TIMEOUT}s"
            echo "--- Docker container status ---"
            docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
            echo "--- OJS logs ---"
            docker compose -f docker-compose.yml -f docker-compose.dev.yml logs ojs --tail=50
            echo "--- Nginx logs ---"
            docker compose -f docker-compose.yml -f docker-compose.dev.yml logs nginx --tail=50
            exit 1
          fi

      - name: Run smoke tests
        working-directory: ./tests/smoke
        run: |
          chmod +x smoke-full.sh
          ./smoke-full.sh http://localhost:8080

      - name: Collect logs on failure
        if: failure()
        working-directory: ./docker
        run: |
          echo "=== Container Status ==="
          docker compose -f docker-compose.yml -f docker-compose.dev.yml ps
          echo ""
          echo "=== OJS Logs ==="
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs ojs --tail=100
          echo ""
          echo "=== Nginx Logs ==="
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs nginx --tail=100
          echo ""
          echo "=== DB Logs ==="
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs db --tail=50

      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v
