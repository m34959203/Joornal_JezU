# =============================================================
# Nginx — OJS 3.4.x reverse proxy configuration
# =============================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=3r/s;

server {
    listen 80;
    server_name ${OJS_DOMAIN:-localhost};

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS (disable in dev)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ${OJS_DOMAIN:-localhost};

    # --- SSL ---
    ssl_certificate     /etc/letsencrypt/live/${OJS_DOMAIN:-localhost}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${OJS_DOMAIN:-localhost}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Document root ---
    root /var/www/html;
    index index.php index.html;

    client_max_body_size 50M;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Deny access to sensitive files ---
    location ~* /config\.inc\.php$ {
        deny all;
        return 404;
    }

    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    location ~ /\.ht {
        deny all;
        return 404;
    }

    # Deny access to lib, classes, cache directories directly
    location ^~ /lib/ {
        deny all;
        return 404;
    }

    location ^~ /classes/ {
        deny all;
        return 404;
    }

    location ^~ /cache/ {
        deny all;
        return 404;
    }

    # --- Nginx health endpoint (internal only) ---
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # --- Static files caching ---
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri $uri/ =404;
    }

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        font/opentype
        image/svg+xml;

    # --- Rate limiting for login ---
    location ~* /login {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # --- OJS rewrite rules ---
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    # --- PHP processing via FastCGI ---
    location ~ \.php$ {
        fastcgi_pass ojs:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        # Security: only process existing PHP files
        try_files $uri =404;
    }

    # --- Logging ---
    access_log /var/log/nginx/ojs_access.log;
    error_log  /var/log/nginx/ojs_error.log warn;
}
