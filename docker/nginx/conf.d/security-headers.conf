# =============================================================================
# security-headers.conf — Security headers для Nginx (JRNL-2026)
# Включается через: include /etc/nginx/conf.d/security-headers.conf;
# Агент: SEC (agents/15-SEC.md)
# Правила: rules/03-security.md
# =============================================================================

# Content Security Policy
# script-src: 'self' + 'unsafe-inline' необходим для OJS (inline JS в Smarty-шаблонах)
# style-src: 'self' + 'unsafe-inline' необходим для OJS (inline styles)
# img-src: 'self' + data: для base64-изображений
# font-src: 'self' для локальных шрифтов
# connect-src: 'self' для AJAX-запросов OJS
# frame-ancestors: 'self' — запрет встраивания в iframe на других сайтах
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

# Запрет MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Запрет встраивания в iframe на других сайтах
add_header X-Frame-Options "SAMEORIGIN" always;

# XSS-фильтр браузера (устаревший, но рекомендуется для legacy-браузеров)
add_header X-XSS-Protection "1; mode=block" always;

# Политика отправки Referer
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Ограничение доступа к API браузера
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# HTTP Strict Transport Security (HSTS)
# max-age=31536000 (1 год), includeSubDomains — все поддомены тоже только HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
