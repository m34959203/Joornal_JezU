# =============================================================
# SEO configuration for OJS — Zhezkazgan University Journal
# =============================================================

# --- Sitemap caching (1 hour) ---
location = /sitemap.xml {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
    add_header X-Robots-Tag "noindex";
    try_files $uri /index.php?$args;
}

# --- robots.txt — serve from static file ---
location = /robots.txt {
    alias /var/www/html/robots.txt;
    expires 1d;
    add_header Cache-Control "public";
    access_log off;
}

# --- Canonical URL header ---
# Adds Link header with canonical URL to all HTML responses
location @canonical {
    add_header Link '<https://$host$request_uri>; rel="canonical"' always;
}

# --- Redirect trailing slashes ---
# Remove trailing slash (except root) to avoid duplicate content
if ($request_uri ~ "^(.+)/$") {
    return 301 $scheme://$host$1;
}

# --- PDF caching (7 days) with proper Content-Disposition ---
location ~* \.pdf$ {
    expires 7d;
    add_header Cache-Control "public, no-transform";
    add_header Content-Disposition 'inline; filename="$uri"';
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "index, follow";

    # Pass to OJS for galley PDFs (served via PHP)
    try_files $uri /index.php?$args;
}

# --- OAI-PMH endpoint (important for indexing services) ---
location = /oai {
    add_header X-Robots-Tag "noindex";
    try_files $uri /index.php?$args;
}

# --- Prevent indexing of utility pages ---
location ~* ^/(gateway|api)/ {
    add_header X-Robots-Tag "noindex, nofollow" always;
    try_files $uri /index.php?$args;
}
